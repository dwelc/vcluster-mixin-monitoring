apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ include "vcluster-monitoring.fullname" . }}
  labels:
    {{- include "vcluster-monitoring.labels" . | nindent 4 }}
spec:
  mode: deployment
  replicas: {{ .Values.replicaCount }}
  image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
  resources:
    {{- toYaml .Values.resources | nindent 4 }}
  livenessProbe:
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 5
  # k8sattributes preset expanded — gives the collector pod awareness of its own k8s
  # context (the upstream chart synthesises these from `presets.kubernetesAttributes`).
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: OTEL_K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: OTEL_K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
    - name: OTEL_K8S_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: OTEL_K8S_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: OTEL_K8S_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: k8s.pod.name=$(OTEL_K8S_POD_NAME),k8s.namespace.name=$(OTEL_K8S_NAMESPACE),k8s.node.name=$(OTEL_K8S_NODE_NAME),host.name=$(OTEL_K8S_NODE_NAME),k8s.node.ip=$(OTEL_K8S_NODE_IP),k8s.pod.ip=$(OTEL_K8S_POD_IP),k8s.cluster.name={{ .Values.clusterName }}
  targetAllocator:
    enabled: true
    allocationStrategy: consistent-hashing
    prometheusCR:
      enabled: true
      scrapeInterval: 30s
      serviceMonitorSelector:
        {{- toYaml .Values.serviceMonitorSelector | nindent 8 }}
      podMonitorSelector: {}
  config:
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: kubelet-cadvisor
              scrape_interval: 60s
              kubernetes_sd_configs:
                - role: node
              scheme: https
              tls_config:
                insecure_skip_verify: true
              authorization:
                credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              metrics_path: /metrics/cadvisor
              relabel_configs:
                - source_labels: [__meta_kubernetes_node_address_InternalIP]
                  target_label: __address__
                  replacement: '$$1:10250'
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                # Drop NFD-injected labels (gpu-operator etc.) — would blow per-series
                # label count past prom remote-write backends' default limits.
                - action: labeldrop
                  regex: feature_node_kubernetes_io_.*
                - source_labels: [__meta_kubernetes_node_name]
                  target_label: node
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      groupbyattrs:
        keys:
          - namespace
          - pod
          - node
      transform/pre_enrich:
        error_mode: ignore
        metric_statements:
          - context: resource
            statements:
              - 'set(attributes["k8s.namespace.name"], attributes["namespace"]) where attributes["namespace"] != nil'
              - 'set(attributes["k8s.pod.name"], attributes["pod"]) where attributes["pod"] != nil'
              - 'set(attributes["k8s.node.name"], attributes["node"]) where attributes["node"] != nil'
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.start_time
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.node.name
            - k8s.container.name
          labels:
            - tag_name: vcluster.virtual.namespace
              key: vcluster.loft.sh/namespace
              from: pod
            - tag_name: vcluster.project
              key: loft.sh/project
              from: namespace
            - tag_name: vcluster.project.namespace
              key: loft.sh/vcluster-instance-namespace
              from: namespace
            - tag_name: vcluster.user
              key: loft.sh/user
              from: namespace
            - tag_name: vcluster.name
              key: loft.sh/vcluster-instance-name
              from: namespace
          annotations:
            - tag_name: vcluster.virtual.pod
              key: vcluster.loft.sh/name
              from: pod
      transform:
        error_mode: ignore
        metric_statements:
          - context: datapoint
            statements:
              - 'set(attributes["k8s.node.name"], resource.attributes["k8s.node.name"])'
              - 'set(attributes["k8s.pod.name"], resource.attributes["k8s.pod.name"])'
              - 'set(attributes["k8s.namespace.name"], resource.attributes["k8s.namespace.name"])'
              - 'set(attributes["vcluster.virtual.pod"], resource.attributes["vcluster.virtual.pod"])'
              - 'set(attributes["vcluster.virtual.namespace"], resource.attributes["vcluster.virtual.namespace"])'
              - 'set(attributes["vcluster.project"], resource.attributes["vcluster.project"])'
              - 'set(attributes["vcluster.project.namespace"], resource.attributes["vcluster.project.namespace"])'
              - 'set(attributes["vcluster.user"], resource.attributes["vcluster.user"])'
              - 'set(attributes["vcluster.name"], resource.attributes["vcluster.name"])'
      filter/vcluster_only:
        metrics:
          datapoint:
            - 'resource.attributes["vcluster.name"] == nil'
      resource/add_cluster:
        attributes:
          - action: upsert
            key: cluster
            value: {{ .Values.clusterName | quote }}
      batch:
        send_batch_size: 10000
        send_batch_max_size: 10000
        timeout: 10s
    exporters:
      prometheusremotewrite:
        endpoint: {{ printf "%s/api/v1/write" (trimSuffix "/" .Values.prometheus.endpoint) | quote }}
        {{- if and .Values.prometheus.username .Values.prometheus.password }}
        auth:
          authenticator: basicauth/prw
        {{- end }}
        {{- if .Values.extraHeaders }}
        headers:
          {{- toYaml .Values.extraHeaders | nindent 10 }}
        {{- end }}
        tls:
          insecure_skip_verify: {{ .Values.prometheus.insecure }}
        resource_to_telemetry_conversion:
          enabled: true
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      {{- if and .Values.prometheus.username .Values.prometheus.password }}
      basicauth/prw:
        client_auth:
          username: {{ .Values.prometheus.username | quote }}
          password: {{ .Values.prometheus.password | quote }}
      {{- end }}
    service:
      extensions:
        - health_check
        {{- if and .Values.prometheus.username .Values.prometheus.password }}
        - basicauth/prw
        {{- end }}
      pipelines:
        metrics:
          receivers:
            - prometheus
          processors:
            - memory_limiter
            - groupbyattrs
            - transform/pre_enrich
            - k8sattributes
            - filter/vcluster_only
            - resource/add_cluster
            - transform
            - batch
          exporters:
            - prometheusremotewrite
